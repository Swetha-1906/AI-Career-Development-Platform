<!DOCTYPE html>
<html>
<head>
    <title>AI Interview Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>AI Interview Trainer</h1>

    <p class="subtitle">
        Practice real-time AI interviews with instant evaluation and feedback.
    </p>

    <!-- TOP ACTIONS -->
    <div class="top-bar">

        <button id="questionBtn">🎯 New Question</button>

        <div class="badge">
            Score: <span id="scoreBadge">--</span>
        </div>

    </div>

    <!-- MAIN GRID -->
    <div class="grid">

        <!-- LEFT: QUESTION -->
        <div class="card">

            <h3>AI Question</h3>

            <p id="questionBox">
                Click "New Question" to start interview
            </p>

        </div>

        <!-- RIGHT: ANSWER -->
        <div class="card">

            <h3>Your Answer</h3>

            <textarea id="answerBox" placeholder="Type your answer here..."></textarea>

            <button id="evaluateBtn">Submit Answer</button>

        </div>

    </div>

    <!-- FEEDBACK -->
    <div class="card feedback">

        <h3>AI Feedback</h3>

        <p id="resultBox">Your evaluation will appear here</p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
