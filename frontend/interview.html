<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interview | Smart Interview Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell interview-shell">
    <header class="interview-header">
      <div>
        <p class="eyebrow">Interview Session</p>
        <h1 id="sessionTitle">Loading session...</h1>
        <p id="sessionMeta" class="hero-copy"></p>
      </div>
      <button class="button secondary-btn" onclick="location.href='index.html'">Dashboard</button>
    </header>

    <section class="interview-card">
      <div class="question-panel">
        <div class="panel-title">AI Question</div>
        <div id="questionBox" class="question-box">Click Get Question to begin.</div>
        <button id="newQuestionBtn" class="button primary-btn">Get Question</button>
      </div>

      <div class="answer-panel">
        <div class="panel-title">Your Answer</div>
        <textarea id="answerBox" placeholder="Type your answer here..."></textarea>
        <div class="timer-row">
          <span id="timerLabel">Timer: --</span>
          <span id="statusLabel">Status: Ready</span>
        </div>
        <button id="evaluateBtn" class="button primary-btn">Evaluate Answer</button>
      </div>
    </section>

    <section class="feedback-card">
      <div class="feedback-header">
        <h2>AI Feedback</h2>
        <span class="score-pill">Score: <strong id="scoreBadge">--</strong>/100</span>
      </div>
      <div id="feedbackBox" class="feedback-box">Your evaluation will appear here.</div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
