<!DOCTYPE html>
<html>
<head>
<title>Resume Analyzer</title>

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #dbeafe, #eff6ff);
}

/* ===== CARD CONTAINER ===== */
.container {
    max-width: 500px;
    margin: 60px auto;
    background: white;
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    transition: 0.3s;
}

/* hover effect */
.container:hover {
    transform: translateY(-3px);
}

/* ===== TITLE ===== */
h1 {
    text-align: center;
    color: #1d4ed8;
    margin-bottom: 5px;
    font-size: 28px;
}

.subtitle {
    text-align: center;
    color: #6b7280;
    margin-bottom: 25px;
    font-size: 14px;
}

/* ===== INPUTS ===== */
.input-group {
    margin-bottom: 18px;
}

label {
    font-weight: 600;
    color: #374151;
    font-size: 14px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    outline: none;
    font-size: 14px;
    transition: 0.2s;
}

/* focus effect */
input:focus, select:focus {
    border-color: #2563eb;
    box-shadow: 0 0 5px rgba(37,99,235,0.3);
}

/* ===== UPLOAD BOX ===== */
.upload-box {
    border: 2px dashed #2563eb;
    padding: 18px;
    text-align: center;
    border-radius: 12px;
    margin-top: 15px;
    background: #f8fafc;
    cursor: pointer;
    transition: 0.3s;
}

.upload-box:hover {
    background: #eef2ff;
}

/* file text */
#fileName {
    margin-top: 8px;
    font-size: 13px;
    color: #6b7280;
}

/* ===== BUTTON ===== */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #2563eb, #1d4ed8);
    color: white;
    border: none;
    border-radius: 10px;
    margin-top: 20px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.02);
    box-shadow: 0 5px 15px rgba(37,99,235,0.3);
}

/* ===== FOOT NOTE STYLE ===== */
.note {
    text-align: center;
    font-size: 12px;
    color: #9ca3af;
    margin-top: 15px;
}

</style>
</head>

<body>

<div class="container">

    <h1>Resume Analyzer</h1>
    <p class="subtitle">Analyze your resume with AI to get ATS score, skill insights, and job role compatibility.</p>

    <form id="uploadForm">

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
            <label>Job Role Preference</label>
            <select id="role">
                <option>Software Engineer</option>
                <option>Data Analyst</option>
                <option>Web Developer</option>
                <option>AI/ML Engineer</option>
            </select>
        </div>

        <div class="upload-box" onclick="document.getElementById('resumeFile').click()">
            <input type="file" id="resumeFile" hidden>
            <strong>Click to Upload Resume</strong>
            <p id="fileName">No file selected</p>
        </div>

        <button type="submit">Analyze Resume</button>

        <p class="note">Supported format: PDF only • Powered by AI ATS Engine</p>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
