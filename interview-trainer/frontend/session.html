<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Session Setup | Smart Interview Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <div class="center-card">
      <p class="eyebrow">Session Setup</p>
      <h1>Create your interview session</h1>
      <p class="hero-copy">Select the domain, difficulty, and mode that match your preparation plan.</p>

      <form id="setupForm" class="setup-form">
        <label>
          Full Name
          <input type="text" id="userName" placeholder="Your name" required>
        </label>
        <label>
          Email
          <input type="email" id="userEmail" placeholder="you@example.com" required>
        </label>
        <label>
          Domain
          <select id="domainSelect">
            <option>Java</option>
            <option>Python</option>
            <option>DBMS</option>
            <option>OS</option>
            <option>CS Basics</option>
          </select>
        </label>
        <label>
          Difficulty
          <div class="button-group">
            <button type="button" class="pill selected" data-value="Easy">Easy</button>
            <button type="button" class="pill" data-value="Medium">Medium</button>
            <button type="button" class="pill" data-value="Hard">Hard</button>
          </div>
          <input type="hidden" id="difficultyInput" value="Easy">
        </label>
        <label>
          Mode
          <select id="modeSelect">
            <option>Practice</option>
            <option>Mock Interview</option>
            <option>Real Interview</option>
          </select>
        </label>
        <label class="checkbox-inline">
          <input type="checkbox" id="voiceMode">
          Enable voice answer mode
        </label>

        <button type="submit" class="button primary-btn">Start Interview</button>
        <a href="index.html" class="button secondary-btn">Back to Dashboard</a>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
