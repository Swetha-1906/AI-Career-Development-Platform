<!DOCTYPE html>
<html>

<head>
    <title>AI Career Advisor</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <h1>AI Career Advisor</h1>

        <p class="subtitle">
            Discover the best career path based on your skills,
            interests and future goals.
        </p>

        <form id="careerForm">

            <input type="text"
                   id="name"
                   placeholder="Enter your name"
                   required>

            <input type="text"
                   id="degree"
                   placeholder="Degree"
                   required>

            <input type="text"
                   id="branch"
                   placeholder="Branch"
                   required>

            <input type="text"
                   id="interests"
                   placeholder="Interests (AI, Web Development, Cyber Security)"
                   required>

            <input type="text"
                   id="skills"
                   placeholder="Known Skills (Python, HTML, CSS)"
                   required>

            <input type="text"
                   id="goal"
                   placeholder="Career Goal (Optional)">

            <button type="submit" id="analyzeBtn">
                Analyze Career
            </button>

        </form>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
